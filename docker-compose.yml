services:
  mysql:
    image: mysql:8.0
    container_name: dbscope-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: testdb
    ports:
      - "13306:3306"
    volumes:
      - ./testdata/mysql-data:/var/lib/mysql
    command:
      - --server-id=1
      - --log-bin=binlog
      - --binlog-format=ROW
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
      - --binlog-row-metadata=FULL
