name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="${GITHUB_SHA::7}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          OUT="dbscope-${VERSION}-${GOOS}-${GOARCH}${{ matrix.ext }}"
          go build -trimpath \
            -ldflags "-s -w -X dbscope/cmd.Version=${VERSION} -X dbscope/cmd.Commit=${COMMIT} -X dbscope/cmd.Date=${DATE}" \
            -o "${OUT}" .
          echo "ARTIFACT=${OUT}" >> "$GITHUB_ENV"

      - name: Package
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${ARTIFACT%.exe}.zip" "${ARTIFACT}"
            echo "ASSET=${ARTIFACT%.exe}.zip" >> "$GITHUB_ENV"
          else
            tar -czf "${ARTIFACT}.tar.gz" "${ARTIFACT}"
            echo "ASSET=${ARTIFACT}.tar.gz" >> "$GITHUB_ENV"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: ${{ env.ASSET }}

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true